<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>

  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      background: #ececec;
      font-family: Tahoma, Geneva, sans-serif;
    }

   
    h1 {
      text-align: center;
      font-weight: normal;
      color: #000;
      padding: 20px 0;
      margin: 0;
    }

   
    #wrapper {
      width: 80vmin;
      height: 70vmin;   
      background: #fff;
      border: 2px solid #ccc;

      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    
    .box {
      width: 110px;
      height: 110px;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
    }

    #navy {
      background: #001f3f;
      top: 0;
      left: 0;
    }

    #teal {
      background: #39cccc;
      top: 0;
      right: 0;
    }

    #blue {
      background: #0074d9;
      bottom: 0;
      left: 0;
    }

    #aqua {
      background: #7fdbff;
      bottom: 0;
      right: 0;
    }

    #footer {
      background: #666;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

  </style>
</head>

<body>

  
  <h1>Absolute 2</h1>

  <section id="wrapper">
    <div id="navy" class="box">Navy</div>
    <div id="teal" class="box">Teal</div>
    <div id="blue" class="box">Blue</div>
    <div id="aqua" class="box">Aqua</div>
    <div id="footer" class="box">Footer</div>
  </section>

</body>
</html>
